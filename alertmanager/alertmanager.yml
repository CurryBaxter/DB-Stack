# ===========================================================================
# Alertmanager base configuration
# Replace the webhook_url or add email/slack receivers for production.
# ===========================================================================

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      repeat_interval: 1h
      receiver: default

receivers:
  - name: default
    # Uncomment and configure one or more notification channels:
    #
    # webhook_configs:
    #   - url: "https://hooks.example.com/alerts"
    #     send_resolved: true
    #
    # email_configs:
    #   - to: "ops@example.com"
    #     from: "alertmanager@example.com"
    #     smarthost: "smtp.example.com:587"
    #     auth_username: "alertmanager@example.com"
    #     auth_password: "changeme"
    #     send_resolved: true
    #
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/..."
    #     channel: "#alerts"
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]
