global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: postgres
    static_configs:
      - targets:
          - postgres_exporter:9187

  - job_name: pgbouncer
    static_configs:
      - targets:
          - pgbouncer_exporter:9127

  - job_name: node
    static_configs:
      - targets:
          - node_exporter:9100

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
