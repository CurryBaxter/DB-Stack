services:
  postgres:
    build:
      context: .
      dockerfile: images/postgres/Dockerfile
    image: local/postgres-pgbackrest:18
    container_name: ${COMPOSE_PROJECT_NAME:-db-stack}-postgres
    restart: unless-stopped
    stop_grace_period: 2m
    shm_size: ${POSTGRES_SHM_SIZE:-1g}
    environment:
      TZ: ${TZ:-UTC}
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-postgres}
      PGDATA: /var/lib/postgresql/18/docker
      APP_DB_NAME: ${APP_DB_NAME}
      APP_DB_USER: ${APP_DB_USER}
      PGBOUNCER_AUTH_USER: ${PGBOUNCER_AUTH_USER:-pgbouncer_auth}
      POSTGRES_EXPORTER_USER: ${POSTGRES_EXPORTER_USER:-postgres_exporter}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      PGBACKREST_STANZA: ${PGBACKREST_STANZA:-main}
      POSTGRES_PORT: ${POSTGRES_PORT_INTERNAL:-5432}
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-200}
      POSTGRES_SHARED_BUFFERS: ${POSTGRES_SHARED_BUFFERS:-1GB}
      POSTGRES_EFFECTIVE_CACHE_SIZE: ${POSTGRES_EFFECTIVE_CACHE_SIZE:-3GB}
      POSTGRES_MAINTENANCE_WORK_MEM: ${POSTGRES_MAINTENANCE_WORK_MEM:-256MB}
      POSTGRES_WORK_MEM: ${POSTGRES_WORK_MEM:-16MB}
      POSTGRES_WAL_BUFFERS: ${POSTGRES_WAL_BUFFERS:-16MB}
      POSTGRES_MIN_WAL_SIZE: ${POSTGRES_MIN_WAL_SIZE:-1GB}
      POSTGRES_MAX_WAL_SIZE: ${POSTGRES_MAX_WAL_SIZE:-4GB}
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: ${POSTGRES_CHECKPOINT_COMPLETION_TARGET:-0.9}
      POSTGRES_RANDOM_PAGE_COST: ${POSTGRES_RANDOM_PAGE_COST:-1.1}
      POSTGRES_EFFECTIVE_IO_CONCURRENCY: ${POSTGRES_EFFECTIVE_IO_CONCURRENCY:-200}
      POSTGRES_MAX_WORKER_PROCESSES: ${POSTGRES_MAX_WORKER_PROCESSES:-8}
      POSTGRES_MAX_PARALLEL_WORKERS: ${POSTGRES_MAX_PARALLEL_WORKERS:-8}
      POSTGRES_MAX_PARALLEL_WORKERS_PER_GATHER: ${POSTGRES_MAX_PARALLEL_WORKERS_PER_GATHER:-4}
      POSTGRES_MAX_WAL_SENDERS: ${POSTGRES_MAX_WAL_SENDERS:-10}
      POSTGRES_MAX_REPLICATION_SLOTS: ${POSTGRES_MAX_REPLICATION_SLOTS:-10}
      POSTGRES_LOG_MIN_DURATION_STATEMENT: ${POSTGRES_LOG_MIN_DURATION_STATEMENT:-500ms}
      POSTGRES_LOG_CHECKPOINTS: ${POSTGRES_LOG_CHECKPOINTS:-on}
      POSTGRES_LOG_CONNECTIONS: ${POSTGRES_LOG_CONNECTIONS:-off}
      POSTGRES_LOG_DISCONNECTIONS: ${POSTGRES_LOG_DISCONNECTIONS:-off}
      POSTGRES_SHARED_PRELOAD_LIBRARIES: ${POSTGRES_SHARED_PRELOAD_LIBRARIES:-pg_stat_statements}
    secrets:
      - postgres_superuser_password
      - app_db_password
      - pgbouncer_auth_password
      - postgres_exporter_password
      - postgres_replication_password
    volumes:
      - postgres_data:/var/lib/postgresql
      - postgres_socket:/var/run/postgresql
      - pgbackrest_repo:/var/lib/pgbackrest
      - ./postgres/conf:/etc/postgres/templates:ro
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
      - ./pgbackrest/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
    command: ["/usr/local/bin/postgres-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-postgres} -d ${POSTGRES_DEFAULT_DB:-postgres} -h /var/run/postgresql"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - db_plane

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: ${COMPOSE_PROJECT_NAME:-db-stack}-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
      APP_DB_NAME: ${APP_DB_NAME}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD_FILE: /run/secrets/app_db_password
      PGBACKREST_STANZA: ${PGBACKREST_STANZA:-main}
      PGBOUNCER_POOL_MODE: ${PGBOUNCER_POOL_MODE:-transaction}
      PGBOUNCER_MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-1000}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-50}
      PGBOUNCER_RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-10}
      PGBOUNCER_RESERVE_POOL_TIMEOUT: ${PGBOUNCER_RESERVE_POOL_TIMEOUT:-5}
      PGBOUNCER_SERVER_RESET_QUERY: ${PGBOUNCER_SERVER_RESET_QUERY:-DISCARD ALL}
      PGBOUNCER_AUTH_USER: ${PGBOUNCER_AUTH_USER:-pgbouncer_auth}
      PGBOUNCER_AUTH_PASSWORD_FILE: /run/secrets/pgbouncer_auth_password
      PGBOUNCER_ADMIN_USERS: ${PGBOUNCER_ADMIN_USERS:-postgres}
      PGBOUNCER_STATS_USERS: ${PGBOUNCER_STATS_USERS:-postgres_exporter}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT_INTERNAL:-5432}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB:-postgres}
      PGBOUNCER_LISTEN_PORT: ${PGBOUNCER_PORT_INTERNAL:-6432}
    secrets:
      - app_db_password
      - pgbouncer_auth_password
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/entrypoint.sh:/entrypoint-custom.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint-custom.sh"]
    ports:
      - "${PGBOUNCER_BIND_ADDRESS:-127.0.0.1}:${PGBOUNCER_PORT:-6432}:${PGBOUNCER_PORT_INTERNAL:-6432}"
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[p]gbouncer'"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - db_plane

  pgbackrest:
    build:
      context: .
      dockerfile: images/postgres/Dockerfile
    image: local/postgres-pgbackrest:18
    container_name: ${COMPOSE_PROJECT_NAME:-db-stack}-pgbackrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
      PGBACKREST_STANZA: ${PGBACKREST_STANZA:-main}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - postgres_data:/var/lib/postgresql:ro
      - postgres_socket:/var/run/postgresql
      - pgbackrest_repo:/var/lib/pgbackrest
      - ./pgbackrest/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - ./pgbackrest/entrypoint.sh:/usr/local/bin/pgbackrest-sidecar.sh:ro
    command: ["/bin/bash", "/usr/local/bin/pgbackrest-sidecar.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pgbackrest --stanza=${PGBACKREST_STANZA:-main} info >/dev/null 2>&1 || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - db_plane

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: ${COMPOSE_PROJECT_NAME:-db-stack}-postgres-exporter
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_URI: "postgres:${POSTGRES_PORT_INTERNAL:-5432}/${POSTGRES_DEFAULT_DB:-postgres}?sslmode=disable"
      DATA_SOURCE_USER: ${POSTGRES_EXPORTER_USER:-postgres_exporter}
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "false"
      PG_EXPORTER_DISABLE_DEFAULT_METRICS: "false"
      PG_EXPORTER_DISABLE_SETTINGS_METRICS: "false"
    secrets:
      - postgres_exporter_password
    command:
      - /bin/sh
      - -ec
      - |
        export DATA_SOURCE_PASS="$$(cat /run/secrets/postgres_exporter_password)"
        exec postgres_exporter
    expose:
      - "9187"
    networks:
      - db_plane
      - obs_plane

  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.8.1
    container_name: ${COMPOSE_PROJECT_NAME:-db-stack}-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.systemd"
      - "--collector.processes"
    pid: host
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"
    networks:
      - obs_plane

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: ${COMPOSE_PROJECT_NAME:-db-stack}-prometheus
    restart: unless-stopped
    depends_on:
      - postgres_exporter
      - node_exporter
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - obs_plane

  grafana:
    image: grafana/grafana-oss:11.1.3
    container_name: ${COMPOSE_PROJECT_NAME:-db-stack}-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-localhost}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
    secrets:
      - grafana_admin_password
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_BIND_ADDRESS:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    networks:
      - obs_plane

networks:
  db_plane:
    name: ${COMPOSE_PROJECT_NAME:-db-stack}_db_plane
    internal: true
  obs_plane:
    name: ${COMPOSE_PROJECT_NAME:-db-stack}_obs_plane
    internal: true

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-db-stack}_postgres_data
  postgres_socket:
    name: ${COMPOSE_PROJECT_NAME:-db-stack}_postgres_socket
  pgbackrest_repo:
    name: ${COMPOSE_PROJECT_NAME:-db-stack}_pgbackrest_repo
  prometheus_data:
    name: ${COMPOSE_PROJECT_NAME:-db-stack}_prometheus_data
  grafana_data:
    name: ${COMPOSE_PROJECT_NAME:-db-stack}_grafana_data

secrets:
  postgres_superuser_password:
    file: ${SECRETS_DIR:-./secrets}/postgres_superuser_password.txt
  app_db_password:
    file: ${SECRETS_DIR:-./secrets}/app_db_password.txt
  pgbouncer_auth_password:
    file: ${SECRETS_DIR:-./secrets}/pgbouncer_auth_password.txt
  postgres_exporter_password:
    file: ${SECRETS_DIR:-./secrets}/postgres_exporter_password.txt
  postgres_replication_password:
    file: ${SECRETS_DIR:-./secrets}/postgres_replication_password.txt
  grafana_admin_password:
    file: ${SECRETS_DIR:-./secrets}/grafana_admin_password.txt
